publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  google_sign_in: ^6.2.2
  provider: ^6.1.2
  http: ^1.3.0
  file_picker: ^9.2.1
  smooth_page_indicator: ^1.2.0+3
  shimmer: ^3.0.0
  share_plus: ^10.1.4
  cached_network_image: ^3.4.1
